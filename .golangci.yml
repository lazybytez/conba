version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: all
  settings:
    exhaustruct:
      exclude:
        - "github.com/spf13/cobra\\.Command"
        - "github.com/docker/docker/api/types/container\\.ListOptions"
    tagliatelle:
      case:
        rules:
          json: snake
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated: use io and os packages instead"

  exclusions:
    rules:
      - linters:
          - gochecknoglobals
        path: export_test\.go
      - linters:
          - gosec
        path: _test\.go
        text: "G101:"
      # E2E suite runs with -p 1 (t.Parallel is forbidden) and uses the
      # TestMain package-var pattern; those two linters contradict the
      # test design and cannot be satisfied by code changes.
      - linters:
          - paralleltest
          - gochecknoglobals
        path: ^test/e2e/
      # Narrow gosec exclusion for the three specific rules that fire on
      # every test shell-out and t.TempDir() file read. Input is
      # test-controlled so the rules carry no signal here. Other gosec
      # rules (G101 hardcoded creds, etc.) still apply.
      - linters:
          - gosec
        path: ^test/e2e/
        text: "G204:|G304:|G703:"
      # configOpts and RetentionConfig are scenario-driven test config
      # structs where partial initialisation is the design — every test
      # exercises a specific subset of fields and the zero value is
      # meaningful for the rest.
      - linters:
          - exhaustruct
        path: ^test/e2e/
        text: "e2e_test\\.configOpts|config\\.RetentionConfig"
      # backupAsHost is a generic seeding helper; the current suite only
      # exercises one hostname value but the parameter shape is part of the
      # helper's contract for future foreign-host scenarios.
      - linters:
          - unparam
        path: ^test/e2e/helpers_test\.go
        text: "backupAsHost"

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
