version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: all
  disable:
    - exhaustruct
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated: use io and os packages instead"

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
