version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: all
  settings:
    exhaustruct:
      exclude:
        - "github.com/spf13/cobra\\.Command"
        - "github.com/docker/docker/api/types/container\\.ListOptions"
    tagliatelle:
      case:
        rules:
          json: snake
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated: use io and os packages instead"

  exclusions:
    rules:
      - linters:
          - gochecknoglobals
        path: export_test\.go

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
