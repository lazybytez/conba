version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: all
  settings:
    exhaustruct:
      exclude:
        - "github.com/spf13/cobra\\.Command"
        - "github.com/docker/docker/api/types/container\\.ListOptions"
    tagliatelle:
      case:
        rules:
          json: snake
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated: use io and os packages instead"

  exclusions:
    rules:
      - linters:
          - gochecknoglobals
        path: export_test\.go
      - linters:
          - gosec
        path: _test\.go
        text: "G101:"
      # E2E suite runs with -p 1 (t.Parallel is forbidden), uses the
      # TestMain package-var pattern, and intentionally shells out to
      # docker / restic / the tested binary, which triggers gosec noise
      # that carries no signal in test code.
      - linters:
          - paralleltest
          - gochecknoglobals
          - gosec
        path: ^test/e2e/

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
