version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: all
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated: use io and os packages instead"
  exclusions:
    rules:
      - path: internal/build/build\.go
        linters:
          - gochecknoglobals

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
